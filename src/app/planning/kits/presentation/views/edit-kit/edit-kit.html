<div class="modal-backdrop" *ngIf="isOpen">
  <div class="edit-modal-box" [formGroup]="editForm">

    <div class="modal-header">
      <div class="header-text-group">
        <h3 class="modal-title">Edit Kit</h3>
        <p class="modal-subtitle">Modify assembly details and component quantities.</p>
      </div>
      <button type="button" class="close-icon-btn" (click)="handleCancel()">
        <span class="close-x">×</span>
      </button>
    </div>

    <div class="modal-scroll-body">
      <div class="fields-stack">

        <div class="form-row-2col">
          <div class="input-field-group">
            <label class="field-label">KIT NAME</label>
            <div class="input-wrapper">
              <input type="text" formControlName="name" class="styled-input" />
            </div>
          </div>

          <div class="input-field-group">
            <label class="field-label">SKU / REFERENCE</label>
            <div class="input-wrapper disabled-wrapper">
              <input type="text" formControlName="sku" class="styled-input readonly-input" />
            </div>
          </div>
        </div>

        <div class="input-field-group">
          <label class="field-label">DESCRIPTION</label>
          <div class="input-wrapper">
            <textarea formControlName="description" class="styled-textarea" rows="3"></textarea>
          </div>
        </div>

        <div class="components-section">
          <div class="section-header-row">
            <label class="field-label">COMPONENT CONFIGURATION</label>
            <button type="button" class="add-supply-btn" (click)="toggleAddSupplyPanel()">
              <span class="plus-icon">⊕</span> Add Supply
            </button>
          </div>

          @if (showAddSupplyPanel()) {
            <div class="add-supply-panel">
              <div class="input-field-group" style="flex: 1;">
                <label class="field-label">SELECT PRODUCT</label>
                <div class="input-wrapper">
                  <select
                    class="styled-input"
                    [ngModel]="selectedSupplyId()"
                    (ngModelChange)="selectedSupplyId.set($event)"
                    [ngModelOptions]="{ standalone: true }"
                  >
                    <option value="" disabled selected>--- Select a product ---</option>
                    @for (supply of getAvailableSuppliesToAdd(); track supply.id) {
                      <option [value]="supply.id">{{ supply.name }} (S/ {{ supply.unitPriceAmount }})</option>
                    }
                  </select>
                </div>
              </div>

              <div class="input-field-group" style="width: 90px;">
                <label class="field-label">QTY</label>
                <div class="input-wrapper">
                  <input
                    type="number"
                    class="styled-input"
                    min="1"
                    [ngModel]="newItemQuantity()"
                    (ngModelChange)="newItemQuantity.set($event)"
                    [ngModelOptions]="{ standalone: true }"
                  />
                </div>
              </div>

              <button
                type="button"
                class="btn-confirm-add-supply"
                [disabled]="!selectedSupplyId()"
                (click)="confirmAddSupply()"
              >
                Add
              </button>
              <button type="button" class="btn-cancel-add-supply" (click)="toggleAddSupplyPanel()">
                Cancel
              </button>
            </div>
          }

          <div class="components-list" formArrayName="items">
            @for (itemGroup of itemsFormArray.controls; track itemGroup.get('customSupplyId')?.value) {
              <div class="component-item-card" [formGroupName]="$index">
                <div class="component-info">
                  <span class="component-name">{{ itemGroup.get('productName')?.value }}</span>
                </div>

                <div class="right-controls">
                  <div class="quantity-input-box">
                    <input type="number" formControlName="quantity" class="qty-field" min="1" />
                  </div>
                  <button type="button" class="remove-item-btn" (click)="removeComponent($index)">
                    <span class="trash-icon">🗑</span>
                  </button>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer-bar">
      <button type="button" class="btn-cancel" (click)="handleCancel()">Cancel</button>
      <button type="button" class="btn-update" [disabled]="editForm.invalid" (click)="handleUpdate()">Update Kit</button>
    </div>

  </div>
</div>
