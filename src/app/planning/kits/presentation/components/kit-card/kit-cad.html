<article class="kit-card">
  <div class="card-image-container">
    <img [src]="kit.imageUrl || 'assets/placeholder-kit.png'" [alt]="kit.name" class="card-image">
  </div>

  <div class="card-content">
    <div class="card-header">
      <h3 class="kit-title">{{ kit.name }}</h3>
      <span class="kit-price">S/ {{ kit.price.toFixed(2) }}</span>
    </div>

    <p class="kit-description">
      {{ kit.description }}
    </p>

    <div class="card-footer">
      <button class="edit-button" (click)="onEdit()">
        <span> {{ 'kits.edit' | translate }} </span>
        <i class="arrow-icon">→</i>
      </button>
    </div>
  </div>
</article>
