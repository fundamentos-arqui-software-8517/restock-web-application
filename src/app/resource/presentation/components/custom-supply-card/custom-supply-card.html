<div class="custom-supply-card">
  <div class="card-image-wrapper">
    <img [src]="customSupply.imgUrl" alt="Supply image" class="supply-image" />
    <span class="badge status-badge" [ngClass]="customSupply.isPerishable() ? 'perishable' : 'non-perishable'">
      {{ customSupply.isPerishable() ? 'PERISHABLE' : 'NON-PERISHABLE' }}
    </span>
  </div>
  
  <div class="card-body">
    <div class="card-meta">
      <span class="category-text">{{ customSupply.category }}</span>
      <span class="uom-badge">{{ customSupply.unit.abbreviation }}</span>
    </div>
    
    <h3 class="supply-name">{{ customSupply.name }}</h3>
    
    <p class="supply-price">{{ customSupply.unitPrice }} PEN</p>
    
    <div class="card-actions">
      <button class="action-btn edit-btn" (click)="edit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit
      </button>
      <button class="action-btn view-btn" (click)="view()" title="View details">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <button class="action-btn delete-btn" (click)="delete()" title="Delete custom supply">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M8 6V4h8v2"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    </div>
  </div>
</div>
