<div class="page-wrapper">

  <!-- Top brand bar -->
  <div class="top-brand">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4.5 30C3.675 30 2.96875 29.7062 2.38125 29.1187C1.79375 28.5312 1.5 27.825 1.5 27V10.0875C1.05 9.8125 0.6875 9.45625 0.4125 9.01875C0.1375 8.58125 0 8.075 0 7.5V3C0 2.175 0.29375 1.46875 0.88125 0.88125C1.46875 0.29375 2.175 0 3 0H27C27.825 0 28.5312 0.29375 29.1187 0.88125C29.7062 1.46875 30 2.175 30 3V7.5C30 8.075 29.8625 8.58125 29.5875 9.01875C29.3125 9.45625 28.95 9.8125 28.5 10.0875V27C28.5 27.825 28.2062 28.5312 27.6187 29.1187C27.0312 29.7062 26.325 30 25.5 30H4.5ZM4.5 10.5V27H25.5V10.5H4.5ZM3 7.5H27V3H3V7.5ZM10.5 18H19.5V15H10.5V18Z" fill="#006C49"/>
    </svg>
    <span class="brand-name">Restock</span>
  </div>

  <!-- Card -->
  <div class="registration-card">

    <!-- Card header -->
    <div class="card-header">
      <h1 class="heading-1">Business Details</h1>
      <p class="heading-subtitle">Complete your organization profile to start monitoring your inventory.</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" class="form-body" (ngSubmit)="onCreateAccount()">

      <div class="form-grid">

        <!-- Left column: business fields -->
        <div class="fields-column">

          <div class="field-group">
            <label class="field-label" for="businessName">BUSINESS NAME</label>
            <input
              id="businessName"
              class="field-input"
              formControlName="businessName"
              placeholder="e.g. Nexus Logistics"
              autocomplete="organization"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="bizPhoneNumber">PHONE NUMBER</label>
            <div class="phone-input-wrapper">
              <svg class="phone-icon" width="11" height="20" viewBox="0 0 11 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.8875 10.5C8.67222 10.5 7.47153 10.2351 6.28542 9.70521C5.09931 9.17535 4.02014 8.4243 3.04792 7.45208C2.07569 6.47986 1.32465 5.40069 0.794792 4.21458C0.264931 3.02847 0 1.82778 0 0.6125C0 0.4375 0.0583333 0.291667 0.175 0.175C0.291667 0.0583333 0.4375 0 0.6125 0H2.975C3.11111 0 3.23264 0.0461806 3.33958 0.138542C3.44653 0.230903 3.50972 0.340278 3.52917 0.466667L3.90833 2.50833C3.92778 2.66389 3.92292 2.79514 3.89375 2.90208C3.86458 3.00903 3.81111 3.10139 3.73333 3.17917L2.31875 4.60833C2.51319 4.96806 2.7441 5.31562 3.01146 5.65104C3.27882 5.98646 3.57292 6.30972 3.89375 6.62083C4.19514 6.92222 4.51111 7.20174 4.84167 7.45937C5.17222 7.71701 5.52222 7.95278 5.89167 8.16667L7.2625 6.79583C7.35 6.70833 7.46424 6.64271 7.60521 6.59896C7.74618 6.55521 7.88472 6.54306 8.02083 6.5625L10.0333 6.97083C10.1694 7.00972 10.2812 7.08021 10.3687 7.18229C10.4562 7.28437 10.5 7.39861 10.5 7.525V9.8875C10.5 10.0625 10.4417 10.2083 10.325 10.325C10.2083 10.4417 10.0625 10.5 9.8875 10.5Z" fill="#3C4A42"/>
              </svg>
              <input
                id="bizPhoneNumber"
                class="field-input phone-field"
                formControlName="phoneNumber"
                placeholder="+1 (555) 000-0000"
                type="tel"
                autocomplete="tel"
              />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="bizAddress">ADDRESS</label>
            <input
              id="bizAddress"
              class="field-input"
              formControlName="address"
              placeholder="123 Industrial Way"
              autocomplete="street-address"
            />
          </div>

          <div class="fields-row">
            <div class="field-group">
              <label class="field-label" for="bizCity">CITY</label>
              <input
                id="bizCity"
                class="field-input"
                formControlName="city"
                placeholder="San Francisco"
                autocomplete="address-level2"
              />
            </div>
            <div class="field-group">
              <label class="field-label" for="bizCountry">COUNTRY</label>
              <div class="select-wrapper">
                <select
                  id="bizCountry"
                  class="field-select"
                  formControlName="country"
                  autocomplete="country-name"
                >
                  @for (c of countries; track c) {
                    <option [value]="c">{{ c }}</option>
                  }
                </select>
                <svg class="select-chevron" width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M6.3 8.4L10.5 12.6L14.7 8.4" stroke="#6B7280" stroke-width="1.575" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>

        </div>

        <!-- Right column: description + categories -->
        <div class="fields-column">

          <div class="field-group">
            <label class="field-label" for="description">BUSINESS DESCRIPTION</label>
            <textarea
              id="description"
              class="field-textarea"
              formControlName="description"
              placeholder="Describe your primary inventory management needs..."
              rows="5"
            ></textarea>
          </div>

          <div class="field-group">
            <label class="field-label">CATEGORIES</label>

            <!-- Selected chips -->
            <div class="chips-wrapper">
              @for (cat of selectedCategories(); track cat) {
                <span class="category-chip">
                  {{ cat }}
                  <button
                    type="button"
                    class="chip-remove"
                    (click)="removeCategory(cat)"
                    [attr.aria-label]="'Remove ' + cat"
                  >
                    <svg width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M0.816667 8.16667L0 7.35L3.26667 4.08333L0 0.816667L0.816667 0L4.08333 3.26667L7.35 0L8.16667 0.816667L4.9 4.08333L8.16667 7.35L7.35 8.16667L4.08333 4.9L0.816667 8.16667Z" fill="#00422B"/>
                    </svg>
                  </button>
                </span>
              }
            </div>

            <!-- Add category dropdown -->
            <div class="select-wrapper">
              <select
                class="field-select"
                (change)="addCategory($event)"
              >
                <option value="">Add a category...</option>
                @for (cat of availableToAdd(); track cat) {
                  <option [value]="cat">{{ cat }}</option>
                }
              </select>
              <svg class="select-chevron" width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.3 8.4L10.5 12.6L14.7 8.4" stroke="#6C7A71" stroke-width="1.575" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

        </div>
      </div>

      <!-- Footer -->
      <footer class="footer-actions">
        <button type="button" class="btn btn-back" (click)="onBack()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.23125 5.25L5.49792 8.51667L4.66667 9.33333L0 4.66667L4.66667 0L5.49792 0.816667L2.23125 4.08333H9.33333V5.25H2.23125Z" fill="#3C4A42"/>
          </svg>
          Back
        </button>
        <button type="submit" class="btn btn-create">
          Create Account
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.10208 5.25H0V4.08333H7.10208L3.83542 0.816667L4.66667 0L9.33333 4.66667L4.66667 9.33333L3.83542 8.51667L7.10208 5.25Z" fill="white"/>
          </svg>
        </button>
      </footer>

    </form>
  </div>
</div>
