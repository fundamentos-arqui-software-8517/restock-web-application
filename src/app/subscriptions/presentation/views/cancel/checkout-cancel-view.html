<div class="success-container">
  <div class="success-card">
    <div class="checkmark-circle" style="background: rgba(239, 68, 68, 0.15);">
      <span class="material-icons checkmark-icon" style="color: #ef4444;">cancel</span>
    </div>
    <h1 class="success-title">{{ 'subscriptions.cancel.title' | translate }}</h1>
    <p class="success-message">{{ 'subscriptions.cancel.message' | translate }}</p>
    
    <div style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
      <button class="continue-btn" style="background: #06b6d4; box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);" (click)="tryAgain()">
        {{ 'subscriptions.cancel.tryAgainButton' | translate }}
      </button>
      <button class="continue-btn" style="background: #334155; box-shadow: none;" (click)="cancel()">
        {{ 'subscriptions.cancel.backButton' | translate }}
      </button>
    </div>
  </div>
</div>
