<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ 'resource.customSupplies.createDialog.title' | translate }}</h2>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>{{ 'resource.customSupplies.createDialog.name' | translate }}</label>
        <input type="text" [(ngModel)]="formData.name" class="form-control" [placeholder]="'resource.customSupplies.createDialog.namePlaceholder' | translate">
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.createDialog.category' | translate }}</label>
        <select [(ngModel)]="formData.categoryId" class="form-control">
          <option value="" disabled selected>{{ 'resource.customSupplies.createDialog.categoryPlaceholder' | translate }}</option>
          <option *ngFor="let cat of uniqueCategories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.createDialog.supply' | translate }}</label>
        <select [(ngModel)]="formData.supplyId" class="form-control">
          <option value="" disabled selected>{{ 'resource.customSupplies.createDialog.supplyPlaceholder' | translate }}</option>
          <ng-container *ngFor="let sup of supplyTemplates()">
            <option *ngIf="!formData.categoryId || sup.category === formData.categoryId" [value]="sup.id">
              {{ sup.name }}
            </option>
          </ng-container>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.createDialog.minCapacity' | translate }}</label>
          <input type="number" [(ngModel)]="formData.minimumStock" class="form-control" [placeholder]="'resource.customSupplies.createDialog.minCapacityPlaceholder' | translate">
        </div>
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.createDialog.maxCapacity' | translate }}</label>
          <input type="number" [(ngModel)]="formData.maximumStock" class="form-control" [placeholder]="'resource.customSupplies.createDialog.maxCapacityPlaceholder' | translate">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.createDialog.unitPrice' | translate }}</label>
          <input type="number" step="0.01" [(ngModel)]="formData.unitPriceAmount" class="form-control" [placeholder]="'resource.customSupplies.createDialog.unitPricePlaceholder' | translate">
        </div>
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.createDialog.currency' | translate }}</label>
          <select [(ngModel)]="formData.unitPriceCurrencyCode" class="form-control">
            <option value="PEN">PEN</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>{{ 'resource.customSupplies.createDialog.uom' | translate }}</label>
          <select [(ngModel)]="formData.unitMeasurement" class="form-control">
            <option value="" disabled selected>{{ 'resource.customSupplies.createDialog.uomPlaceholder' | translate }}</option>
            <option *ngFor="let unit of unitMeasurements" [value]="unit">{{ unit }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.createDialog.description' | translate }}</label>
        <textarea [(ngModel)]="formData.description" class="form-control" rows="3" [placeholder]="'resource.customSupplies.createDialog.descriptionPlaceholder' | translate"></textarea>
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.createDialog.image' | translate }}</label>
        <div class="image-upload-area" (click)="imageInput.click()" (dragover)="$event.preventDefault()" (drop)="onImageDrop($event)">
          <img *ngIf="imagePreviewUrl" [src]="imagePreviewUrl" class="image-preview" alt="Preview">
          <div *ngIf="!imagePreviewUrl" class="upload-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>{{ 'resource.customSupplies.createDialog.imageDrag' | translate }}</span>
            <small>{{ 'resource.customSupplies.createDialog.imageHint' | translate }}</small>
          </div>
          <input #imageInput type="file" accept="image/*" class="hidden-input" (change)="onImageSelected($event)">
        </div>
        <div *ngIf="imagePreviewUrl" class="image-url-row">
          <input type="text" [(ngModel)]="formData.imageUrl" class="form-control" [placeholder]="'resource.customSupplies.createDialog.imageUrlPlaceholder' | translate">
        </div>
        <div *ngIf="!imagePreviewUrl" class="image-url-row">
          <input type="text" [(ngModel)]="formData.imageUrl" class="form-control" [placeholder]="'resource.customSupplies.createDialog.imageUrlPlaceholder' | translate">
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="cancel()">{{ 'resource.customSupplies.createDialog.cancel' | translate }}</button>
      <button class="btn btn-create" (click)="create()">{{ 'resource.customSupplies.createDialog.create' | translate }}</button>
    </div>
  </div>
</div>
