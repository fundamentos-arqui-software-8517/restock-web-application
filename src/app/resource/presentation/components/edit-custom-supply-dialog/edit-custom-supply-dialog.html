<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ 'resource.customSupplies.editDialog.title' | translate }}</h2>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>{{ 'resource.customSupplies.editDialog.name' | translate }}</label>
        <input type="text" [(ngModel)]="formData.name" class="form-control" [placeholder]="'resource.customSupplies.editDialog.namePlaceholder' | translate">
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.editDialog.minCapacity' | translate }}</label>
          <input type="number" [(ngModel)]="formData.minimumStock" class="form-control" [placeholder]="'resource.customSupplies.editDialog.minCapacityPlaceholder' | translate">
        </div>
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.editDialog.maxCapacity' | translate }}</label>
          <input type="number" [(ngModel)]="formData.maximumStock" class="form-control" [placeholder]="'resource.customSupplies.editDialog.maxCapacityPlaceholder' | translate">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.editDialog.unitPrice' | translate }}</label>
          <input type="number" step="0.01" [(ngModel)]="formData.unitPriceAmount" class="form-control" [placeholder]="'resource.customSupplies.editDialog.unitPricePlaceholder' | translate">
        </div>
        <div class="form-group half-width">
          <label>{{ 'resource.customSupplies.editDialog.currency' | translate }}</label>
          <select [(ngModel)]="formData.unitPriceCurrencyCode" class="form-control">
            <option value="PEN">PEN</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>{{ 'resource.customSupplies.editDialog.uom' | translate }}</label>
          <select [(ngModel)]="formData.unitMeasurement" class="form-control">
            <option value="" disabled selected>{{ 'resource.customSupplies.editDialog.uomPlaceholder' | translate }}</option>
            <option *ngFor="let unit of unitMeasurements" [value]="unit">{{ unit }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.editDialog.description' | translate }}</label>
        <textarea [(ngModel)]="formData.description" class="form-control" rows="3" [placeholder]="'resource.customSupplies.editDialog.descriptionPlaceholder' | translate"></textarea>
      </div>

      <div class="form-group">
        <label>{{ 'resource.customSupplies.editDialog.image' | translate }}</label>
        <div class="image-upload-area" (click)="imageInput.click()" (dragover)="$event.preventDefault()" (drop)="onImageDrop($event)">
          <img *ngIf="imagePreviewUrl" [src]="imagePreviewUrl" class="image-preview" alt="Preview">
          <div *ngIf="!imagePreviewUrl" class="upload-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>{{ 'resource.customSupplies.editDialog.imageDrag' | translate }}</span>
            <small>{{ 'resource.customSupplies.editDialog.imageHint' | translate }}</small>
          </div>
          <input #imageInput type="file" accept="image/*" class="hidden-input" (change)="onImageSelected($event)">
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="cancel()">{{ 'resource.customSupplies.editDialog.cancel' | translate }}</button>
      <button class="btn btn-create" (click)="update()">{{ 'resource.customSupplies.editDialog.update' | translate }}</button>
    </div>
  </div>
</div>
